# GoReleaser configuration. Docs: https://goreleaser.com
# Cut a release by pushing a semver tag, e.g.:
#   git tag -a v0.1.0 -m "v0.1.0" && git push origin v0.1.0
# The release workflow (.github/workflows/release.yml) runs this.
version: 2

project_name: dnssie

before:
  hooks:
    - go mod download

builds:
  - id: dnssie
    main: ./cmd/dnssie
    binary: dnssie
    env:
      - CGO_ENABLED=0 # pure Go: cross-compiles from one Linux runner
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}" # reproducible builds
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .CommitDate }}

archives:
  - id: dnssie
    ids:
      - dnssie
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto # tags like v1.0.0-rc.1 publish as pre-releases
  name_template: "{{ .Tag }}"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
